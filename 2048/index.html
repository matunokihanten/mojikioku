<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 脳トレゲーム</title>
    <style>
        :root {
            --bg-color: #faf8ef;
            --grid-bg: #bbada0;
            --cell-empty: #cdc1b4;
            --text-dark: #776e65;
            --text-light: #f9f6f2;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px 0;
            touch-action: none; /* スマホでのスクロール防止 */
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 320px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 36px;
            margin: 0;
        }

        .score-container {
            background-color: var(--grid-bg);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: bold;
            text-align: center;
        }

        .score-title {
            font-size: 13px;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 20px;
        }

        .controls {
            width: 320px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }

        button {
            background-color: #8f7a66;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #9f8b77;
        }

        .grid-container {
            background-color: var(--grid-bg);
            padding: 10px;
            border-radius: 10px;
            width: 300px;
            height: 300px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 10px;
            position: relative;
        }

        .grid-cell {
            background-color: var(--cell-empty);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            color: var(--text-dark);
            transition: all 0.1s ease-in-out;
        }

        /* 数字ごとのスタイル */
        [data-val="2"] { background-color: #eee4da; }
        [data-val="4"] { background-color: #ede0c8; }
        [data-val="8"] { background-color: #f2b179; color: var(--text-light); }
        [data-val="16"] { background-color: #f59563; color: var(--text-light); }
        [data-val="32"] { background-color: #f67c5f; color: var(--text-light); }
        [data-val="64"] { background-color: #f65e3b; color: var(--text-light); }
        [data-val="128"] { background-color: #edcf72; color: var(--text-light); font-size: 24px; box-shadow: 0 0 10px rgba(243, 215, 116, 0.5); }
        [data-val="256"] { background-color: #edcc61; color: var(--text-light); font-size: 24px; box-shadow: 0 0 15px rgba(243, 215, 116, 0.6); }
        [data-val="512"] { background-color: #edc850; color: var(--text-light); font-size: 24px; box-shadow: 0 0 20px rgba(243, 215, 116, 0.7); }
        [data-val="1024"] { background-color: #edc53f; color: var(--text-light); font-size: 20px; box-shadow: 0 0 25px rgba(243, 215, 116, 0.8); }
        [data-val="2048"] { background-color: #edc22e; color: var(--text-light); font-size: 20px; box-shadow: 0 0 30px rgba(243, 215, 116, 0.9); }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(238, 228, 218, 0.73);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: bold;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .game-over.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>2048</h1>
        <div class="score-container">
            <div class="score-title">SCORE</div>
            <div class="score-value" id="score">0</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="initGame()">New Game</button>
    </div>

    <div class="grid-container" id="grid">
        <!-- 16個のセルをJavaScriptで生成します -->
        <div class="game-over" id="gameOver">
            Game Over!
            <button onclick="initGame()" style="margin-top: 15px;">Try Again</button>
        </div>
    </div>

    <script>
        const gridElement = document.getElementById('grid');
        const scoreElement = document.getElementById('score');
        const gameOverElement = document.getElementById('gameOver');
        let grid = [];
        let score = 0;

        // 初期化
        function initGame() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            scoreElement.innerText = score;
            gameOverElement.classList.remove('active');
            
            // UIのクリアと再構築
            const cells = document.querySelectorAll('.grid-cell');
            cells.forEach(cell => cell.remove());
            
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.classList.add('grid-cell');
                cell.id = 'cell-' + Math.floor(i / 4) + '-' + (i % 4);
                gridElement.appendChild(cell);
            }
            gridElement.appendChild(gameOverElement);

            addNewTile();
            addNewTile();
            updateBoard();
        }

        // 新しいタイル（2 または 4）を空いている場所に追加
        function addNewTile() {
            let emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) {
                        emptyCells.push({r, c});
                    }
                }
            }
            if (emptyCells.length > 0) {
                let randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[randomCell.r][randomCell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // 画面の描画更新
        function updateBoard() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.getElementById(`cell-${r}-${c}`);
                    const value = grid[r][c];
                    cell.innerText = value === 0 ? '' : value;
                    cell.setAttribute('data-val', value);
                }
            }
            scoreElement.innerText = score;
            checkGameOver();
        }

        // 行の合体ロジック
        function slide(row) {
            let arr = row.filter(val => val); // 0を除外
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    arr[i + 1] = 0;
                }
            }
            arr = arr.filter(val => val); // 合体後の0を除外
            while (arr.length < 4) arr.push(0); // 足りない分を0で埋める
            return arr;
        }

        // 移動処理
        function move(direction) {
            let oldGrid = JSON.stringify(grid);

            if (direction === 'LEFT' || direction === 'RIGHT') {
                for (let r = 0; r < 4; r++) {
                    let row = grid[r];
                    if (direction === 'RIGHT') row.reverse();
                    row = slide(row);
                    if (direction === 'RIGHT') row.reverse();
                    grid[r] = row;
                }
            } else if (direction === 'UP' || direction === 'DOWN') {
                for (let c = 0; c < 4; c++) {
                    let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
                    if (direction === 'DOWN') col.reverse();
                    col = slide(col);
                    if (direction === 'DOWN') col.reverse();
                    for (let r = 0; r < 4; r++) {
                        grid[r][c] = col[r];
                    }
                }
            }

            if (oldGrid !== JSON.stringify(grid)) {
                addNewTile();
                updateBoard();
            }
        }

        // ゲームオーバー判定
        function checkGameOver() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return; // 空きがある
                    if (r !== 3 && grid[r][c] === grid[r + 1][c]) return; // 縦に合体可能
                    if (c !== 3 && grid[r][c] === grid[r][c + 1]) return; // 横に合体可能
                }
            }
            gameOverElement.classList.add('active');
        }

        // キーボード操作
        document.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault(); // スクロール防止
            }
            if (e.key === 'ArrowLeft') move('LEFT');
            if (e.key === 'ArrowRight') move('RIGHT');
            if (e.key === 'ArrowUp') move('UP');
            if (e.key === 'ArrowDown') move('DOWN');
        });

        // スマホのスワイプ操作
        let touchStartX = 0;
        let touchStartY = 0;
        
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        document.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, {passive: false});

        function handleSwipe(startX, startY, endX, endY) {
            const dx = endX - startX;
            const dy = endY - startY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) > 30) { // スワイプの閾値
                if (absDx > absDy) {
                    if (dx > 0) move('RIGHT');
                    else move('LEFT');
                } else {
                    if (dy > 0) move('DOWN');
                    else move('UP');
                }
            }
        }

        // 初回ロード時の起動
        initGame();
    </script>
</body>
</html>
