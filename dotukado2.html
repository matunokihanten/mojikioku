<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>右脳覚醒：ドッツトレーニング Pro</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 5px;
            font-family: 'Segoe UI', 'Meiryo', sans-serif;
            background: #000;
            color: #E0E0E0;
            overflow: hidden;
        }

        #stats {
            font-size: 1rem;
            color: #00FFFF;
            height: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        .inputs {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 5px;
            font-size: 0.8rem;
        }

        .input-group { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 0.7rem; color: #ADD8E6; margin-bottom: 2px; }
        input, select { width: 90%; background: #222; border: 1px solid #444; color: white; padding: 3px; border-radius: 5px; text-align: center; }

        #canvas {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 35vh;
            border: 2px solid #66FFFF;
            box-shadow: 0 0 15px rgba(102, 255, 255, 0.3);
            margin-bottom: 5px;
            overflow: hidden;
            border-radius: 10px;
            background-color: #000;
            transition: background-color 0.3s;
        }

        .cv-black { background-color: #000 !important; }
        .cv-white { background-color: #ffffff !important; }
        .cv-blue { background-color: #001f3f !important; }

        .dot {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, #ff8e8e, #ff0000, #8b0000);
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(255, 0, 0, 0.8);
            transition: opacity 0.1s ease-out;
        }

        #msg {
            height: 1.5rem;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
        }

        #answerArea {
            width: 100%;
            max-width: 400px;
            display: grid;
            gap: 5px;
            margin-bottom: 5px;
        }

        .grid-small { grid-template-columns: repeat(5, 1fr); }
        .grid-keypad { grid-template-columns: repeat(3, 1fr); }

        .btn-ans {
            height: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(102, 255, 255, 0.1);
            color: #E0E0E0;
            border: 1px solid #66FFFF;
            border-radius: 8px;
        }
        .btn-ans:active { background: #66FFFF; color: #000; }

        #displayFieldValue {
            grid-column: span 3;
            background: #000;
            color: #00FFFF;
            font-size: 1.5rem;
            text-align: center;
            border: 1px solid #66FFFF;
            border-radius: 8px;
            margin-bottom: 3px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .controls {
            display: flex;
            gap: 5px;
            width: 100%;
            max-width: 400px;
        }

        .btn-main {
            flex: 1;
            padding: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        #startBtn { background: #00d2ff; color: #000; }
        #toggleSettings { background: #444; color: #fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="stats">Combo: 0</div>

    <div class="inputs" id="settingsArea">
        <div class="input-group">
            <label>表示エリア色</label>
            <select id="bgColorSelect" onchange="changeCanvasBg()">
                <option value="cv-black" selected>黒</option>
                <option value="cv-white">白</option>
                <option value="cv-blue">青</option>
            </select>
        </div>
        <div class="input-group">
            <label>表示時間</label>
            <select id="flashTime">
                <option value="0.1">0.1 (神速)</option>
                <option value="0.3">0.3 (超難問)</option>
                <option value="0.5" selected>0.5 (推奨)</option>
                <option value="0.8">0.8 (初級)</option>
                <option value="999">消さない</option>
            </select>
        </div>
        <div class="input-group">
            <label>最小玉数</label>
            <input type="number" id="minDots" value="1" min="1">
        </div>
        <div class="input-group">
            <label>最大玉数</label>
            <input type="number" id="maxDots" value="10" min="1">
        </div>
    </div>

    <div id="canvas" class="cv-black" onclick="drawDots()"></div>

    <div id="msg"></div>

    <div id="answerArea"></div>

    <div class="controls">
        <button id="startBtn" class="btn-main" onclick="drawDots()">次へ (Enter)</button>
        <button id="toggleSettings" class="btn-main" onclick="toggleSettings()">設定切替</button>
        <button class="btn-main" style="background:#555; color:#fff;" onclick="resetGame()">リセット</button>
    </div>

    <script>
        let correctCount = 0;
        let combo = 0;
        let isWaitingAnswer = false;
        let currentInput = "";

        function changeCanvasBg() {
            const theme = document.getElementById("bgColorSelect").value;
            const canvas = document.getElementById("canvas");
            canvas.className = theme;
        }

        function toggleSettings() {
            document.getElementById('settingsArea').classList.toggle('hidden');
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') drawDots();
            if (!isWaitingAnswer) return;
            if (e.key >= '0' && e.key <= '9') {
                const max = parseInt(document.getElementById("maxDots").value);
                if (max <= 10) {
                    checkAnswer(parseInt(e.key));
                } else {
                    addNumber(e.key);
                }
            }
            if (e.key === 'Backspace') backspace();
        });

        function drawDots() {
            const canvas = document.getElementById("canvas");
            canvas.innerHTML = "";
            document.getElementById("msg").textContent = "";
            currentInput = "";
            
            const minDots = parseInt(document.getElementById("minDots").value);
            const maxDots = parseInt(document.getElementById("maxDots").value);
            const flashTime = parseFloat(document.getElementById("flashTime").value);
            
            correctCount = Math.floor(Math.random() * (maxDots - minDots + 1)) + minDots;
            
            createAnswerUI(minDots, maxDots);

            // 玉のサイズ調整
            let dotSize = 55;
            if (correctCount > 10) dotSize = 40;
            if (correctCount > 30) dotSize = 25;
            if (correctCount > 60) dotSize = 15;

            const gap = 4; // 1mm ≒ 4px (一般的なディスプレイ基準)
            const padding = 10;
            const placedDots = [];

            for (let i = 0; i < correctCount; i++) {
                let x, y, overlap;
                let attempts = 0;
                // 配置試行回数を増やして重なりを回避しやすくする
                const maxAttempts = 300;

                do {
                    overlap = false;
                    x = Math.random() * (canvas.clientWidth - dotSize - padding * 2) + padding;
                    y = Math.random() * (canvas.clientHeight - dotSize - padding * 2) + padding;
                    
                    for (const dot of placedDots) {
                        const dist = Math.sqrt((dot.x - x) ** 2 + (dot.y - y) ** 2);
                        // 玉のサイズ(半径の合計) + 指定された間隔(1mm) 以下の場合は重なりとみなす
                        if (dist < (dotSize + gap)) { 
                            overlap = true; 
                            break; 
                        }
                    }
                    attempts++;
                } while (overlap && attempts < maxAttempts);

                placedDots.push({x, y});
                const dot = document.createElement("div");
                dot.className = "dot";
                dot.style.width = dot.style.height = `${dotSize}px`;
                dot.style.left = `${x}px`;
                dot.style.top = `${y}px`;
                canvas.appendChild(dot);
            }

            isWaitingAnswer = true;
            if (flashTime < 10) {
                setTimeout(() => {
                    const dots = document.querySelectorAll(".dot");
                    dots.forEach(d => d.style.opacity = "0");
                }, flashTime * 1000);
            }
        }

        function createAnswerUI(min, max) {
            const container = document.getElementById("answerArea");
            container.innerHTML = "";

            if (max > 10) {
                container.className = "grid-keypad";
                const display = document.createElement("div");
                display.id = "displayFieldValue";
                display.textContent = "-";
                container.appendChild(display);

                for (let i = 1; i <= 9; i++) {
                    const btn = createKey(i, () => addNumber(i));
                    container.appendChild(btn);
                }
                container.appendChild(createKey("C", backspace));
                container.appendChild(createKey(0, () => addNumber(0)));
                const okBtn = createKey("決定", confirmAnswer);
                okBtn.style.background = "#00d2ff";
                okBtn.style.color = "#000";
                container.appendChild(okBtn);
            } else {
                container.className = "grid-small";
                for (let i = min; i <= max; i++) {
                    const btn = createKey(i, () => checkAnswer(i));
                    container.appendChild(btn);
                }
            }
        }

        function createKey(text, action) {
            const btn = document.createElement("button");
            btn.className = "btn-ans";
            btn.textContent = text;
            btn.onclick = action;
            return btn;
        }

        function addNumber(num) {
            if (!isWaitingAnswer) return;
            currentInput += num.toString();
            document.getElementById("displayFieldValue").textContent = currentInput;
        }

        function backspace() {
            currentInput = currentInput.slice(0, -1);
            document.getElementById("displayFieldValue").textContent = currentInput || "-";
        }

        function confirmAnswer() {
            if (currentInput === "") return;
            checkAnswer(parseInt(currentInput));
        }

        function checkAnswer(selected) {
            if (!isWaitingAnswer) return;
            const msg = document.getElementById("msg");
            if (selected === correctCount) {
                combo++;
                msg.textContent = "正解！";
                msg.style.color = "#00FF7F";
                document.getElementById("stats").textContent = `Combo: ${combo}`;
                isWaitingAnswer = false;
                setTimeout(drawDots, 800);
            } else {
                combo = 0;
                msg.textContent = `正解は ${correctCount}`;
                msg.style.color = "#FF4500";
                document.getElementById("stats").textContent = `Combo: 0`;
                isWaitingAnswer = false;
            }
        }

        function resetGame() {
            combo = 0;
            document.getElementById("stats").textContent = `Combo: 0`;
            document.getElementById("canvas").innerHTML = "";
            document.getElementById("msg").textContent = "リセットしました";
            document.getElementById("answerArea").innerHTML = "";
            isWaitingAnswer = false;
        }
    </script>
</body>
</html>
