<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>右脳覚醒：ドッツトレーニング Pro MAX</title>
    <style>
        * { box-sizing: border-box; touch-action: manipulation; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh; /* 動的なビューポート高さに対応 */
            margin: 0;
            padding: 5px;
            font-family: 'Segoe UI', 'Meiryo', sans-serif;
            background: #000;
            color: #E0E0E0;
            overflow: hidden;
        }

        /* 画面切り替え用 */
        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }
        .hidden { display: none !important; }

        /* 設定画面のスタイル */
        #setup-screen {
            overflow-y: auto;
            padding: 10px;
        }
        .setup-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }
        .setup-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }
        .setup-group label {
            font-size: 0.85rem;
            color: #ADD8E6;
            margin-bottom: 4px;
            font-weight: bold;
        }
        .setup-group select, .setup-group input {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 8px;
            font-size: 1rem;
        }

        /* トレーニング画面のスタイル */
        #game-screen {
            justify-content: space-between; /* 要素を上下に分散配置 */
        }

        #stats {
            font-size: 1rem;
            color: #00FFFF;
            padding: 5px 0;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        /* キャンバス：ここを可変にしてボタンを押し出さないようにする */
        #canvas {
            position: relative;
            width: 100%;
            max-width: 400px;
            flex: 1; /* 空いているスペースをすべて使う */
            min-height: 150px; /* 最小限の高さは確保 */
            border: 2px solid #66FFFF;
            box-shadow: 0 0 15px rgba(102, 255, 255, 0.2);
            margin: 5px 0;
            overflow: hidden;
            border-radius: 10px;
            transition: background-color 0.2s;
        }

        .dot {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            transition: opacity 0.1s ease-out;
        }

        #msg {
            min-height: 1.5rem;
            font-size: 0.9rem;
            font-weight: bold;
            text-align: center;
            padding: 2px 0;
        }

        #answerArea {
            width: 100%;
            max-width: 400px;
            display: grid;
            gap: 4px;
            margin-bottom: 5px;
        }

        .grid-small { grid-template-columns: repeat(5, 1fr); }
        .grid-keypad { grid-template-columns: repeat(3, 1fr); }

        .btn-ans {
            height: 40px;
            font-size: 1.1rem;
            font-weight: bold;
            background: rgba(102, 255, 255, 0.1);
            color: #E0E0E0;
            border: 1px solid #66FFFF;
            border-radius: 8px;
        }
        .btn-ans:active { background: #66FFFF; color: #000; }

        #displayFieldValue {
            grid-column: span 3;
            background: #000;
            color: #00FFFF;
            font-size: 1.4rem;
            text-align: center;
            border: 1px solid #66FFFF;
            border-radius: 8px;
            margin-bottom: 2px;
            height: 38px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            padding: 5px 0 10px 0;
        }

        .btn-main {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
        #startBtn { background: #00d2ff; color: #000; }
        #backToSetup { background: #444; color: #fff; }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen">
        <h2 style="color:#00FFFF; margin: 10px 0;">トレーニング設定</h2>
        <div class="setup-card">
            <div class="setup-group">
                <label>表示時間 (秒)</label>
                <select id="flashTime">
                    <option value="0.05">0.05 (超神速)</option>
                    <option value="0.1">0.1 (神速)</option>
                    <option value="0.3">0.3 (超難問)</option>
                    <option value="0.5" selected>0.5 (推奨)</option>
                    <option value="0.8">0.8 (初級)</option>
                    <option value="999">消さない</option>
                </select>
            </div>
            <div class="setup-group" style="flex-direction: row; gap: 10px;">
                <div style="flex:1;">
                    <label>最小玉数</label>
                    <input type="number" id="minDots" value="1" min="1">
                </div>
                <div style="flex:1;">
                    <label>最大玉数</label>
                    <input type="number" id="maxDots" value="10" min="1">
                </div>
            </div>
            <div class="setup-group">
                <label>基本エリア色</label>
                <select id="bgColorSelect">
                    <option value="#000">黒</option>
                    <option value="#0000FF">青</option>
                    <option value="#FFF">白</option>
                </select>
            </div>
            <div class="setup-group">
                <label>オートレベルアップ</label>
                <select id="autoLevelUp">
                    <option value="on" selected>ON (10問ごとに+1)</option>
                    <option value="off">OFF (固定)</option>
                </select>
            </div>
            <div class="setup-group">
                <label>カラーノイズ (ランダム色)</label>
                <select id="colorNoise">
                    <option value="off" selected>OFF</option>
                    <option value="on">ON (毎回色が変わる)</option>
                </select>
            </div>
            <div class="setup-group">
                <label>配置パターン</label>
                <select id="layoutPattern">
                    <option value="random" selected>ランダム配置</option>
                    <option value="grid">整列配置（グリッド）</option>
                </select>
            </div>
            <button id="startBtn" class="btn-main" onclick="startTraining()" style="margin-top:10px; width:100%;">トレーニング開始</button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="stats">Combo: 0</div>
        <div id="canvas" onclick="drawDots()"></div>
        <div id="msg"></div>
        <div id="answerArea"></div>
        <div class="controls">
            <button id="backToSetup" class="btn-main" onclick="showSetup()">設定に戻る</button>
            <button id="nextBtn" class="btn-main" style="background:#00d2ff; color:#000;" onclick="drawDots()">次へ (Enter)</button>
        </div>
    </div>

    <script>
        let correctCount = 0;
        let combo = 0;
        let isWaitingAnswer = false;
        let currentInput = "";
        let config = {};

        function startTraining() {
            config = {
                flashTime: parseFloat(document.getElementById('flashTime').value),
                minDots: parseInt(document.getElementById('minDots').value),
                maxDots: parseInt(document.getElementById('maxDots').value),
                bgColor: document.getElementById('bgColorSelect').value,
                autoLevelUp: document.getElementById('autoLevelUp').value === 'on',
                colorNoise: document.getElementById('colorNoise').value === 'on',
                layoutPattern: document.getElementById('layoutPattern').value
            };

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            combo = 0;
            document.getElementById("stats").textContent = `Combo: 0`;
            drawDots();
        }

        function showSetup() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
            isWaitingAnswer = false;
        }

        window.addEventListener('keydown', (e) => {
            if (document.getElementById('game-screen').classList.contains('hidden')) return;
            if (e.key === 'Enter') drawDots();
            if (!isWaitingAnswer) return;
            if (e.key >= '0' && e.key <= '9') {
                const buttonCount = config.maxDots - config.minDots + 1;
                if (buttonCount <= 10) {
                    checkAnswer(parseInt(e.key));
                } else {
                    addNumber(e.key);
                }
            }
            if (e.key === 'Backspace') backspace();
        });

        function drawDots() {
            const canvas = document.getElementById("canvas");
            canvas.innerHTML = "";
            document.getElementById("msg").textContent = "";
            currentInput = "";
            
            let currentBg = config.bgColor;
            let dotGradient = "radial-gradient(circle at 30% 30%, #ff8e8e, #ff0000, #8b0000)";
            
            if (config.colorNoise) {
                const colors = ["#000", "#0000FF", "#FFF", "#004d00", "#4d004d"];
                currentBg = colors[Math.floor(Math.random() * colors.length)];
                const dotColors = [
                    ["#ff8e8e", "#ff0000", "#8b0000"], ["#8eff8e", "#00ff00", "#004d00"],
                    ["#ffff8e", "#ffff00", "#4d4d00"], ["#8effff", "#00ffff", "#004d4d"]
                ];
                const dc = dotColors[Math.floor(Math.random() * dotColors.length)];
                dotGradient = `radial-gradient(circle at 30% 30%, ${dc[0]}, ${dc[1]}, ${dc[2]})`;
            }
            canvas.style.backgroundColor = currentBg;

            correctCount = Math.floor(Math.random() * (config.maxDots - config.minDots + 1)) + config.minDots;
            createAnswerUI();

            let dotSize = 55;
            if (correctCount > 10) dotSize = 40;
            if (correctCount > 30) dotSize = 25;
            if (correctCount > 60) dotSize = 15;

            const gap = 4;
            const padding = 15;
            const placedDots = [];

            if (config.layoutPattern === 'random') {
                for (let i = 0; i < correctCount; i++) {
                    let x, y, overlap;
                    let attempts = 0;
                    do {
                        overlap = false;
                        x = Math.random() * (canvas.clientWidth - dotSize - padding * 2) + padding;
                        y = Math.random() * (canvas.clientHeight - dotSize - padding * 2) + padding;
                        for (const dot of placedDots) {
                            const dist = Math.sqrt((dot.x - x) ** 2 + (dot.y - y) ** 2);
                            if (dist < (dotSize + gap)) { overlap = true; break; }
                        }
                        attempts++;
                    } while (overlap && attempts < 500);
                    placedDots.push({x, y});
                }
            } else {
                const cols = Math.ceil(Math.sqrt(correctCount));
                const rows = Math.ceil(correctCount / cols);
                const cellW = (canvas.clientWidth - padding * 2) / cols;
                const cellH = (canvas.clientHeight - padding * 2) / rows;
                for (let i = 0; i < correctCount; i++) {
                    const r = Math.floor(i / cols);
                    const c = i % cols;
                    const x = padding + (c * cellW) + (cellW - dotSize) / 2;
                    const y = padding + (r * cellH) + (cellH - dotSize) / 2;
                    placedDots.push({x, y});
                }
            }

            placedDots.forEach(pos => {
                const dot = document.createElement("div");
                dot.className = "dot";
                dot.style.width = dot.style.height = `${dotSize}px`;
                dot.style.left = `${pos.x}px`;
                dot.style.top = `${pos.y}px`;
                dot.style.background = dotGradient;
                canvas.appendChild(dot);
            });

            isWaitingAnswer = true;
            if (config.flashTime < 10) {
                setTimeout(() => {
                    document.querySelectorAll(".dot").forEach(d => d.style.opacity = "0");
                }, config.flashTime * 1000);
            }
        }

        function createAnswerUI() {
            const container = document.getElementById("answerArea");
            container.innerHTML = "";
            const buttonCount = config.maxDots - config.minDots + 1;

            if (buttonCount >= 11) {
                container.className = "grid-keypad";
                const display = document.createElement("div");
                display.id = "displayFieldValue";
                display.textContent = "-";
                container.appendChild(display);
                for (let i = 1; i <= 9; i++) container.appendChild(createKey(i, () => addNumber(i)));
                container.appendChild(createKey("C", backspace));
                container.appendChild(createKey(0, () => addNumber(0)));
                const okBtn = createKey("決定", confirmAnswer);
                okBtn.style.background = "#00d2ff";
                okBtn.style.color = "#000";
                container.appendChild(okBtn);
            } else {
                container.className = "grid-small";
                for (let i = config.minDots; i <= config.maxDots; i++) {
                    container.appendChild(createKey(i, () => checkAnswer(i)));
                }
            }
        }

        function createKey(text, action) {
            const btn = document.createElement("button");
            btn.className = "btn-ans";
            btn.textContent = text;
            btn.onclick = action;
            return btn;
        }

        function addNumber(num) {
            if (!isWaitingAnswer) return;
            currentInput += num.toString();
            document.getElementById("displayFieldValue").textContent = currentInput;
            if (currentInput.length >= correctCount.toString().length) {
                setTimeout(confirmAnswer, 50); 
            }
        }

        function backspace() {
            currentInput = currentInput.slice(0, -1);
            document.getElementById("displayFieldValue").textContent = currentInput || "-";
        }

        function confirmAnswer() {
            if (currentInput === "") return;
            checkAnswer(parseInt(currentInput));
        }

        function checkAnswer(selected) {
            if (!isWaitingAnswer) return;
            const msg = document.getElementById("msg");
            if (selected === correctCount) {
                combo++;
                if (config.autoLevelUp && combo > 0 && combo % 10 === 0) {
                    config.minDots++;
                    config.maxDots++;
                    msg.textContent = "LEVEL UP! 玉数が増えました！";
                    msg.style.color = "#FFD700";
                    isWaitingAnswer = false;
                    setTimeout(drawDots, 1000); 
                } else {
                    document.getElementById("stats").textContent = `Combo: ${combo}`;
                    isWaitingAnswer = false;
                    drawDots(); 
                }
            } else {
                combo = 0;
                msg.textContent = `残念。正解は ${correctCount}`;
                msg.style.color = "#FF4500";
                document.getElementById("stats").textContent = `Combo: 0`;
                currentInput = ""; 
                if (document.getElementById("displayFieldValue")) document.getElementById("displayFieldValue").textContent = "-";
            }
        }
    </script>
</body>
</html>
