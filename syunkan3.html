<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記憶の宮殿トレーニング - 松之木飯店ver 6.0</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .game-container {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 800px; /* 横幅を少し広げました */
            position: relative;
        }
        h1 { margin: 10px 0 20px 0; color: #d32f2f; font-size: 24px; }
        
        /* 設定エリア */
        .settings-area {
            background-color: #fff3e0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
        }
        .settings-row { margin-bottom: 12px; }
        label { font-weight: bold; margin-right: 10px; display:block; margin-bottom: 5px;}
        select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
            width: 100%;
            background: white;
        }

        /* 記憶の宮殿（場所）表示エリア */
        #palace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 20px 0;
            width: 100%;
        }

        .location-card {
            background: #fff;
            border: 2px solid #ddd;
            border-radius: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }
        
        .location-name {
            font-size: 14px;
            color: #666;
            background: #eee;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .food-icon {
            font-size: 70px; /* アイコン巨大化 */
            line-height: 1.1;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
        }

        /* ボタン類 */
        .btn {
            background-color: #e60012;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin: 5px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 8px rgba(0,0,0,0.15); }
        .btn:active { transform: translateY(0); }
        
        .btn-blue { background-color: #1976d2; } 
        .btn-green { background-color: #43a047; }
        .btn-gray { background-color: #78909c; padding: 10px 20px; font-size: 14px;}
        
        .btn-option {
            background-color: #ff9800;
            width: 100%;
            margin: 8px 0;
            font-size: 20px;
            text-align: left;
            padding-left: 20px;
        }

        #message { font-size: 22px; font-weight: bold; color: #555; min-height: 35px; margin-bottom: 10px;}
        #round-info { color: #888; font-size: 14px; margin-bottom: 5px; }
        #sub-question-info { color: #e60012; font-weight:bold; font-size: 16px; margin-bottom: 5px; }

        .hidden { display: none !important; }
        
        /* 結果画面 */
        #result-area { text-align: center; }
        .score-text { font-size: 40px; color: #e60012; font-weight: bold; margin: 20px 0; }
        
        /* アニメーション */
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .pop-anim { animation: pop 0.3s ease; }
    </style>
</head>
<body>

<div class="game-container">
    <h1 id="title">🏰 記憶の宮殿トレーニング v6.0</h1>

    <div id="settings-panel" class="settings-area">
        <div class="settings-row">
            <label>🎮 モード選択:</label>
            <select id="mode-select">
                <option value="manual">じっくり (自分のペース)</option>
                <option value="time">タイムアタック (時間制限)</option>
            </select>
        </div>
        <div class="settings-row">
            <label>🔥 広さ (場所の数):</label>
            <select id="level-select">
                <option value="easy">狭い店 (3箇所 / 5秒)</option>
                <option value="normal" selected>普通のお店 (5箇所 / 3秒)</option>
                <option value="hard">大繁盛店 (7箇所 / 2秒)</option>
                <option value="god">王宮レストラン (9箇所 / 1秒)</option>
            </select>
        </div>
        <div class="settings-row">
            <label>🧠 1オーダーあたりの質問数:</label>
            <select id="questions-per-order">
                <option value="1">1問だけ</option>
                <option value="3" selected>3問連続 (おすすめ)</option>
                <option value="5">5問連続 (ハード)</option>
            </select>
        </div>
        <div class="settings-row">
            <label>🔢 全体のラウンド数:</label>
            <select id="round-select">
                <option value="3">3ラウンド</option>
                <option value="5" selected>5ラウンド</option>
            </select>
        </div>
    </div>
    
    <div id="game-status" class="hidden">
        <div id="round-info">第 1 ラウンド</div>
        <div id="sub-question-info" class="hidden">質問 1/3</div>
        <button onclick="quitGame()" class="btn btn-gray" style="position: absolute; top: 10px; right: 10px;">終了</button>
    </div>

    <div id="message">設定を選んでスタート！</div>

    <div id="palace-grid" class="hidden"></div>

    <div id="controls">
        <button id="start-btn" class="btn" onclick="startGame()">ゲームスタート！</button>
        <button id="manual-hide-btn" class="btn btn-blue hidden" onclick="hideOrderAndStartQuizLoop()">覚えた！ (回答)</button>
        <button id="next-q-btn" class="btn btn-green hidden" onclick="nextSubQuestion()">次の質問へ ➡️</button>
        <button id="next-round-btn" class="btn hidden" onclick="nextRound()">次のオーダーへ 🆕</button>
    </div>

    <div id="quiz-area" class="hidden">
        <div id="question-text" style="font-size: 24px; margin-bottom: 20px; font-weight:bold; color:#1565c0;"></div>
        <div id="options-container"></div>
    </div>

    <div id="result-area" class="hidden">
        <h2>🎉 トレーニング終了！</h2>
        <div class="score-text" id="final-score"></div>
        <div id="comment" style="font-size:18px; color:#555;"></div>
        <button class="btn" onclick="resetToTitle()">タイトルに戻る</button>
    </div>
</div>

<script>
    // 🥟 メニューアイコン
    const menuItems = [
        '🍜', '🥟', '🍚', '🍺', '🥗', '🍦', '🥢', '🥩', 
        '🍣', '🍤', '🍱', '🍛', '🍵', '🍶', '🍔', '🍟', 
        '🍕', '🍝', '🥪', '🍰', '☕', '🍳', '🥓', '🍞', '🍮'
    ];

    // 🏰 記憶の場所（パレス）の定義：順番が重要です
    const palaceLocations = [
        "① 入口", "② カウンター左", "③ カウンター右", 
        "④ 1番テーブル", "⑤ 2番テーブル", "⑥ 3番テーブル", 
        "⑦ レジ", "⑧ 厨房", "⑨ 出前バイク"
    ];
    
    // ゲーム状態変数
    let currentOrderMap = []; // { loc: "入口", item: "🍜" } の配列
    let correctAnswer = "";
    let correctValue = ""; // 内部比較用
    let timerInterval = null;
    
    let currentRound = 0;
    let maxRounds = 5;
    let questionsPerOrder = 1;
    let currentQuestionCount = 0; 
    
    let totalScore = 0;
    let totalQuestionsAsked = 0;
    let isGameActive = false;
    
    let askedQuestionsLog = [];

    // 🎮 ゲーム開始
    function startGame() {
        maxRounds = parseInt(document.getElementById('round-select').value);
        questionsPerOrder = parseInt(document.getElementById('questions-per-order').value);
        
        currentRound = 0;
        totalScore = 0;
        totalQuestionsAsked = 0;
        isGameActive = true;

        // UI初期化
        document.getElementById('settings-panel').classList.add('hidden');
        document.getElementById('start-btn').classList.add('hidden');
        document.getElementById('result-area').classList.add('hidden');
        document.getElementById('game-status').classList.remove('hidden');
        document.getElementById('title').classList.add('hidden');

        nextRound();
    }

    // 🆕 新しいオーダー（ラウンド）
    function nextRound() {
        currentRound++;
        
        if (currentRound > maxRounds) {
            showResults();
            return;
        }

        currentQuestionCount = 0;
        askedQuestionsLog = [];

        document.getElementById('round-info').innerText = `第 ${currentRound} / ${maxRounds} ラウンド`;
        document.getElementById('sub-question-info').classList.add('hidden');
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('next-round-btn').classList.add('hidden');
        document.getElementById('palace-grid').classList.remove('hidden');
        document.body.style.backgroundColor = "#f0f4f8";

        // 設定読み込み
        const level = document.getElementById('level-select').value;
        const mode = document.getElementById('mode-select').value;
        
        let itemCount = 5;
        let timeLimit = 3;

        if (level === 'easy') { itemCount = 3; timeLimit = 5; }
        else if (level === 'normal') { itemCount = 5; timeLimit = 3; }
        else if (level === 'hard') { itemCount = 7; timeLimit = 2; }
        else if (level === 'god') { itemCount = 9; timeLimit = 1; }

        // 🏰 パレス生成ロジック
        currentOrderMap = [];
        // ランダムにアイテムを選ぶ
        let selectedItems = [];
        for(let i=0; i<itemCount; i++) {
             selectedItems.push(menuItems[Math.floor(Math.random() * menuItems.length)]);
        }
        
        // 場所とアイテムを紐付ける（ここが記憶の宮殿の肝）
        const grid = document.getElementById('palace-grid');
        grid.innerHTML = ""; // クリア

        for (let i = 0; i < itemCount; i++) {
            const locName = palaceLocations[i];
            const item = selectedItems[i];
            
            // データ保存
            currentOrderMap.push({ location: locName, item: item });

            // カード生成
            const card = document.createElement('div');
            card.className = 'location-card';
            card.innerHTML = `
                <div class="location-name">${locName}</div>
                <div class="food-icon">${item}</div>
            `;
            grid.appendChild(card);
        }

        // モード別動作
        if (mode === 'manual') {
            document.getElementById('message').innerText = "場所と物をイメージして覚えて！👇";
            document.getElementById('manual-hide-btn').classList.remove('hidden');
        } else {
            document.getElementById('manual-hide-btn').classList.add('hidden');
            let timeLeft = timeLimit;
            document.getElementById('message').innerText = `記憶タイム: 残り ${timeLeft.toFixed(1)} 秒`;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!isGameActive) { clearInterval(timerInterval); return; }
                timeLeft -= 0.1;
                document.getElementById('message').innerText = `記憶タイム: 残り ${Math.max(0, timeLeft).toFixed(1)} 秒`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    hideOrderAndStartQuizLoop();
                }
            }, 100);
        }
    }

    // 🙈 隠してクイズ開始
    function hideOrderAndStartQuizLoop() {
        document.getElementById('palace-grid').classList.add('hidden');
        document.getElementById('manual-hide-btn').classList.add('hidden');
        nextSubQuestion(); 
    }

    // ❓ 質問ループ
    function nextSubQuestion() {
        currentQuestionCount++;
        document.body.style.backgroundColor = "#f0f4f8"; 
        document.getElementById('next-q-btn').classList.add('hidden'); 
        document.getElementById('message').innerText = "イメージを思い出して！";

        const subInfo = document.getElementById('sub-question-info');
        if (questionsPerOrder > 1) {
            subInfo.classList.remove('hidden');
            subInfo.innerText = `質問 ${currentQuestionCount} / ${questionsPerOrder}`;
        }

        generatePalaceQuiz();
    }

    // 🎲 記憶の宮殿専用クイズ生成
    function generatePalaceQuiz() {
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        // クイズタイプをランダム決定
        // 1. 場所クイズ: 「[場所] にあったのは？」 (難易度:低)
        // 2. 逆引きクイズ: 「[アイテム] があった場所は？」 (難易度:高)
        // 3. 個数クイズ: (アクセントとして残す)
        
        const r = Math.random();
        let quizType = 'LOCATION_TO_ITEM'; // Default
        
        if (r < 0.4) quizType = 'LOCATION_TO_ITEM'; 
        else if (r < 0.8) quizType = 'ITEM_TO_LOCATION';
        else quizType = 'COUNT';

        let validQuizFound = false;
        let retry = 0;

        while (!validQuizFound && retry < 20) {
            retry++;
            
            if (quizType === 'LOCATION_TO_ITEM') {
                // 場所 → 物
                const target = currentOrderMap[Math.floor(Math.random() * currentOrderMap.length)];
                const key = `L2I-${target.location}`;
                
                if (!askedQuestionsLog.includes(key)) {
                    askedQuestionsLog.push(key);
                    questionText.innerText = `「${target.location}」に あったのは？`;
                    correctAnswer = target.item;
                    correctValue = target.item;
                    
                    let options = [target.item];
                    while(options.length < 3) {
                        const dummy = menuItems[Math.floor(Math.random() * menuItems.length)];
                        if(!options.includes(dummy)) options.push(dummy);
                    }
                    createButtons(options, false); // false = アイコン表示
                    validQuizFound = true;
                }
            } 
            else if (quizType === 'ITEM_TO_LOCATION') {
                // 物 → 場所
                const target = currentOrderMap[Math.floor(Math.random() * currentOrderMap.length)];
                const key = `I2L-${target.location}`; // 場所を一意のキーにする
                
                if (!askedQuestionsLog.includes(key)) {
                    askedQuestionsLog.push(key);
                    questionText.innerText = `「${target.item}」が 置いてあった場所は？`;
                    correctAnswer = target.location;
                    correctValue = target.location;
                    
                    let options = [target.location];
                    // ダミーの場所を作成（現在のオーダーに含まれない場所も含める）
                    while(options.length < 3) {
                        const dummy = palaceLocations[Math.floor(Math.random() * palaceLocations.length)];
                        if(!options.includes(dummy)) options.push(dummy);
                    }
                    createButtons(options, true); // true = 文字表示
                    validQuizFound = true;
                }
            }
            else {
                // 個数（箸休め）
                 const targetItem = currentOrderMap[Math.floor(Math.random() * currentOrderMap.length)].item;
                 const key = `CNT-${targetItem}`;
                 
                 if (!askedQuestionsLog.includes(key)) {
                    askedQuestionsLog.push(key);
                    const count = currentOrderMap.filter(d => d.item === targetItem).length;
                    questionText.innerText = `全体で「${targetItem}」は いくつあった？`;
                    correctValue = count; // 数値
                    correctAnswer = count.toString(); // 表示用文字（使わないかも）
                    
                    let options = [count, count+1, Math.max(0, count-1)];
                    options = [...new Set(options)]; 
                    while(options.length < 3) {
                         let d = Math.floor(Math.random() * 5);
                         if(!options.includes(d)) options.push(d);
                    }
                    createButtons(options, true);
                    validQuizFound = true;
                 }
            }
        }

        // フォールバック（問題切れの場合）
        if (!validQuizFound) {
            const target = currentOrderMap[0];
            questionText.innerText = `(サービス)「${target.location}」にあったのは？`;
            correctValue = target.item;
            createButtons([target.item, menuItems[0], menuItems[1]], false);
        }
        
        document.getElementById('quiz-area').classList.remove('hidden');
    }

    function createButtons(options, isText) {
        // シャッフル
        options.sort(() => Math.random() - 0.5);
        
        const container = document.getElementById('options-container');
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-option';
            // アイコンのみの場合は大きく表示
            if (!isText && typeof opt === 'string' && opt.match(/[\uD800-\uDBFF][\uDC00-\uDFFF]/)) {
                btn.style.fontSize = "40px";
                btn.style.textAlign = "center";
                btn.innerText = opt;
            } else {
                btn.style.fontSize = "20px";
                btn.innerText = opt;
            }
            btn.onclick = () => checkAnswer(opt);
            container.appendChild(btn);
        });
    }

    // ✅ 正解判定
    function checkAnswer(userAnswer) {
        totalQuestionsAsked++;
        const message = document.getElementById('message');
        const container = document.querySelector('.game-container');
        
        container.classList.remove('pop-anim');
        void container.offsetWidth;
        container.classList.add('pop-anim');

        // 正誤判定 (型を合わせる)
        if (String(userAnswer) === String(correctValue)) {
            totalScore++;
            message.innerText = "🎉 正解！！ナイス記憶！";
            document.body.style.backgroundColor = "#c8e6c9";
        } else {
            message.innerText = `😢 残念... 正解は「${correctValue}」でした`;
            document.body.style.backgroundColor = "#ffcdd2";
        }

        document.getElementById('quiz-area').classList.add('hidden');

        if (currentQuestionCount < questionsPerOrder) {
            const nextBtn = document.getElementById('next-q-btn');
            nextBtn.classList.remove('hidden');
            nextBtn.innerText = `次の質問へ (${currentQuestionCount}/${questionsPerOrder})`;
        } else {
            const nextRndBtn = document.getElementById('next-round-btn');
            nextRndBtn.classList.remove('hidden');
            if (currentRound >= maxRounds) {
                nextRndBtn.innerText = "結果を見る 🏆";
            } else {
                nextRndBtn.innerText = "次のオーダーへ 🆕";
            }
        }
    }

    // 🏆 結果発表
    function showResults() {
        isGameActive = false;
        document.getElementById('game-status').classList.add('hidden');
        document.getElementById('palace-grid').classList.add('hidden');
        document.getElementById('controls').classList.add('hidden'); 
        
        document.getElementById('result-area').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${totalQuestionsAsked}問中、${totalScore}問正解！`;
        
        const rate = totalScore / totalQuestionsAsked;
        let comment = "";
        if (rate === 1) comment = "🧠 記憶の宮殿マスター！！脳が輝いています！✨";
        else if (rate >= 0.8) comment = "素晴らしい空間把握能力！その調子です！🗺️";
        else if (rate >= 0.6) comment = "「場所」と「物」の結びつけができています！👍";
        else comment = "場所のイメージを強く思い浮かべるのがコツです！🏠";
        
        document.getElementById('comment').innerText = comment;
    }

    function quitGame() {
        clearInterval(timerInterval);
        isGameActive = false;
        resetToTitle();
    }

    function resetToTitle() {
        document.getElementById('result-area').classList.add('hidden');
        document.getElementById('game-status').classList.add('hidden');
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('palace-grid').classList.add('hidden');
        document.getElementById('next-q-btn').classList.add('hidden');
        document.getElementById('next-round-btn').classList.add('hidden');
        document.getElementById('manual-hide-btn').classList.add('hidden');
        document.getElementById('controls').classList.remove('hidden');

        document.getElementById('settings-panel').classList.remove('hidden');
        document.getElementById('start-btn').classList.remove('hidden');
        document.getElementById('title').classList.remove('hidden');
        document.getElementById('message').innerText = "設定を選んでスタート！";
        document.body.style.backgroundColor = "#f0f4f8";
    }
</script>

</body>
</html>
