<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>瞬間記憶トレーニング Pro</title>
  <style>
    :root {
      --bg-color: #f8f9fa;
      --text-color: #212529;
      --primary: #007bff;
      --success: #28a745;
      --error: #dc3545;
      --key-bg: #e9ecef;
    }

    /* 全体レイアウト：スクロールを完全に禁止 */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      user-select: none;
    }

    /* 設定画面 */
    #setupScreen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 20px;
    }

    .setting-card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 350px;
      text-align: center;
    }

    .setting-group {
      margin-bottom: 20px;
    }

    .setting-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 0.9em;
      color: #666;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px;
      font-size: 1.2em;
      border: 2px solid #ddd;
      border-radius: 10px;
      text-align: center;
      outline: none;
    }

    .mode-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85em;
    }

    .mode-btn.active {
      border-color: var(--primary);
      background-color: #e7f1ff;
      color: var(--primary);
    }

    .btn-start {
      width: 100%;
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 15px;
      font-size: 1.3em;
      font-weight: bold;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,123,255,0.3);
      touch-action: manipulation;
    }

    /* ゲーム画面 */
    #gameScreen {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    /* 問題表示エリア */
    #displayArea {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: background-color 0.2s;
      padding: 0 10px; /* 横のはみ出し防止 */
    }

    #statusInfo {
      position: absolute;
      top: 15px;
      font-size: 0.9em;
      color: #888;
      font-weight: bold;
    }

    #mainDisplay {
      font-size: 4.5em; /* 初期値、JSで可変 */
      font-weight: 800;
      letter-spacing: 0.05em;
      text-align: center;
      width: 100%;
      word-wrap: break-word;
      line-height: 1.2;
    }

    /* キーパッドエリア */
    #keypadArea {
      padding: 15px;
      background: white;
      border-top: 1px solid #eee;
      height: 45%;
    }

    #keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 12px;
      height: 100%;
    }

    #keypad button {
      border: none;
      border-radius: 15px;
      background-color: var(--key-bg);
      font-size: 1.8em;
      font-weight: bold;
      color: var(--text-color);
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.05s, transform 0.05s;
    }

    #keypad button:active {
      background-color: #ced4da;
      transform: scale(0.95);
    }

    .btn-del { color: var(--error) !important; font-size: 1.4em !important; }
    .btn-end { font-size: 1em !important; color: #666; }

    /* アニメーション */
    .bg-correct { background-color: #d4edda !important; }
    .bg-error { background-color: #f8d7da !important; }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    .shake { animation: shake 0.3s ease-in-out; }
  </style>
</head>
<body>

  <div id="setupScreen">
    <div class="setting-card">
      <h2 style="margin-top: 0;">瞬間記憶トレ</h2>
      
      <div class="setting-group">
        <label>モード選択</label>
        <div class="mode-selector">
          <button class="mode-btn active" id="modeSurvival">レベルアップ</button>
          <button class="mode-btn" id="modeFixed">桁数固定</button>
        </div>
      </div>

      <div class="setting-group">
        <label>開始時の桁数</label>
        <input type="number" id="inputDigits" value="4" min="1" max="20">
      </div>

      <div class="setting-group">
        <label>表示時間 (秒)</label>
        <input type="number" id="inputTime" value="2.0" min="0.1" step="0.1">
      </div>

      <button class="btn-start" id="btnStart">スタート</button>
    </div>
  </div>

  <div id="gameScreen">
    <div id="displayArea">
      <div id="statusInfo">
        <span id="labelMode">レベルアップ</span> : <span id="labelDigits">4</span>桁
      </div>
      <div id="mainDisplay">準備...</div>
    </div>
    
    <div id="keypadArea">
      <div id="keypad">
        <button data-num="7">7</button>
        <button data-num="8">8</button>
        <button data-num="9">9</button>
        <button data-num="4">4</button>
        <button data-num="5">5</button>
        <button data-num="6">6</button>
        <button data-num="1">1</button>
        <button data-num="2">2</button>
        <button data-num="3">3</button>
        <button class="btn-end" id="btnEnd">終了</button>
        <button data-num="0">0</button>
        <button class="btn-del" id="btnDel">←</button>
      </div>
    </div>
  </div>

  <script>
    let config = {
      digits: 4,
      time: 2000,
      mode: 'survival' 
    };

    let state = {
      target: "",
      input: "",
      isAcceptingInput: false
    };

    const setupScreen = document.getElementById('setupScreen');
    const gameScreen = document.getElementById('gameScreen');
    const mainDisplay = document.getElementById('mainDisplay');
    const labelDigits = document.getElementById('labelDigits');
    const labelMode = document.getElementById('labelMode');
    const displayArea = document.getElementById('displayArea');

    // 桁数に応じてフォントサイズを調整する関数
    function adjustFontSize(length) {
      // 基本は4.5em、6桁を超えたら徐々に小さくする（最小1.5em）
      let size = 4.5;
      if (length > 6) {
        size = Math.max(1.5, 4.5 * (7 / length));
      }
      mainDisplay.style.fontSize = size + "rem";
    }

    // モード切り替え
    document.getElementById('modeSurvival').onclick = () => setMode('survival');
    document.getElementById('modeFixed').onclick = () => setMode('fixed');

    function setMode(m) {
      config.mode = m;
      document.getElementById('modeSurvival').classList.toggle('active', m === 'survival');
      document.getElementById('modeFixed').classList.toggle('active', m === 'fixed');
      labelMode.textContent = m === 'survival' ? "レベルアップ" : "桁数固定";
    }

    // ゲーム開始
    document.getElementById('btnStart').onclick = () => {
      config.digits = parseInt(document.getElementById('inputDigits').value) || 4;
      config.time = (parseFloat(document.getElementById('inputTime').value) || 2.0) * 1000;
      
      setupScreen.style.display = 'none';
      gameScreen.style.display = 'flex';
      nextRound();
    };

    // ゲーム終了
    document.getElementById('btnEnd').onclick = () => {
      setupScreen.style.display = 'flex';
      gameScreen.style.display = 'none';
    };

    function nextRound() {
      state.input = "";
      state.isAcceptingInput = false;
      labelDigits.textContent = config.digits;
      adjustFontSize(config.digits);
      
      mainDisplay.textContent = "＋";
      
      setTimeout(() => {
        // ランダム数字生成
        state.target = "";
        for(let i=0; i<config.digits; i++) {
          state.target += Math.floor(Math.random() * 10).toString();
        }
        mainDisplay.textContent = state.target;
        
        setTimeout(() => {
          renderInput();
          state.isAcceptingInput = true;
        }, config.time);
      }, 800);
    }

    function renderInput() {
      let dots = "";
      for(let i=0; i<config.digits; i++) {
        dots += (i < state.input.length) ? state.input[i] : "_";
      }
      mainDisplay.textContent = dots;
    }

    // キーパッド処理
    document.querySelectorAll('#keypad button[data-num]').forEach(btn => {
      btn.onclick = () => {
        if(!state.isAcceptingInput) return;
        if(state.input.length < config.digits) {
          state.input += btn.dataset.num;
          renderInput();
          if(state.input.length === config.digits) checkAnswer();
        }
      };
    });

    document.getElementById('btnDel').onclick = () => {
      if(!state.isAcceptingInput) return;
      state.input = state.input.slice(0, -1);
      renderInput();
    };

    function checkAnswer() {
      state.isAcceptingInput = false;
      
      if(state.input === state.target) {
        displayArea.classList.add('bg-correct');
        mainDisplay.textContent = "OK!";
        if(config.mode === 'survival') config.digits++;
        
        setTimeout(() => {
          displayArea.classList.remove('bg-correct');
          nextRound();
        }, 600);
      } else {
        displayArea.classList.add('bg-error', 'shake');
        adjustFontSize(Math.max(config.digits, 8)); // 不正解時は少し小さめにして表示
        mainDisplay.innerHTML = `<small style="font-size:0.4em; display:block; color:#666; margin-bottom:5px;">正解は</small>${state.target}`;
        
        setTimeout(() => {
          displayArea.classList.remove('bg-error', 'shake');
          if(config.mode === 'survival') {
            config.digits = parseInt(document.getElementById('inputDigits').value) || 4;
          }
          nextRound();
        }, 2000);
      }
    }
  </script>
</body>
</html>
